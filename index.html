<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atendimentos — Task Cursos</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f2f5;
    --white: #ffffff;
    --ink: #0d1117;
    --ink2: #3d4451;
    --muted: #8b92a5;
    --border: #e1e4ea;
    --pending: #f59e0b;
    --pending-bg: #fef9ee;
    --progress: #3b82f6;
    --progress-bg: #eff6ff;
    --waiting: #8b5cf6;
    --waiting-bg: #f5f3ff;
    --done: #10b981;
    --done-bg: #ecfdf5;
    --danger: #ef4444;
    --danger-bg: #fef2f2;
    --shadow: 0 2px 8px rgba(0,0,0,0.07);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.14);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
  }

  h1, h2, h3, .stat-value, .card-name { font-family: 'Syne', sans-serif; }

  /* HEADER */
  .header {
    background: var(--ink);
    color: #fff;
    padding: 22px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  .header-left .eyebrow {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .18em;
    color: #6b7280;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .header-left h1 {
    font-size: 24px;
    font-weight: 800;
    letter-spacing: -.02em;
    color: #fff;
  }
  .btn-new {
    background: #fff;
    color: var(--ink);
    border: none;
    border-radius: 10px;
    padding: 10px 20px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    transition: .15s;
    white-space: nowrap;
  }
  .btn-new:hover { background: #e5e7eb; }

  /* MAIN */
  .main { max-width: 860px; margin: 0 auto; padding: 24px 20px; }

  /* STATS */
  .stats { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
  .stat {
    background: var(--white);
    border-radius: 12px;
    padding: 14px 18px;
    box-shadow: var(--shadow);
    flex: 1 1 80px;
    text-align: center;
    cursor: pointer;
    border: 2px solid transparent;
    transition: .15s;
  }
  .stat:hover { border-color: var(--border); }
  .stat.active { border-color: var(--ink); }
  .stat-value { font-size: 26px; font-weight: 800; line-height: 1; }
  .stat-label { font-size: 10px; color: var(--muted); font-weight: 600; margin-top: 4px; text-transform: uppercase; letter-spacing: .06em; }

  /* FILTERS */
  .filters { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
  .filters input, .filters select {
    padding: 9px 13px;
    border-radius: 9px;
    border: 1.5px solid var(--border);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    background: var(--white);
    color: var(--ink);
    outline: none;
    transition: border .15s;
  }
  .filters input { flex: 1 1 180px; }
  .filters input:focus, .filters select:focus { border-color: var(--ink); }

  /* EMPTY */
  .empty {
    text-align: center;
    color: var(--muted);
    padding: 56px 20px;
    background: var(--white);
    border-radius: 14px;
    border: 2px dashed var(--border);
    font-size: 14px;
    line-height: 1.6;
  }

  /* CARD */
  .list { display: flex; flex-direction: column; gap: 10px; }
  .card {
    background: var(--white);
    border-radius: 12px;
    box-shadow: var(--shadow);
    border-left: 4px solid var(--border);
    overflow: hidden;
    transition: box-shadow .15s;
  }
  .card:hover { box-shadow: 0 4px 18px rgba(0,0,0,0.1); }
  .card.overdue { border-left-color: var(--danger) !important; }
  .card.urgent { border-left-color: var(--pending) !important; }

  .card-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    cursor: pointer;
    gap: 12px;
  }
  .card-name {
    font-size: 15px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 7px;
    display: flex;
    align-items: center;
    gap: 7px;
    flex-wrap: wrap;
  }
  .card-meta { display: flex; gap: 7px; flex-wrap: wrap; align-items: center; }
  .meta-text { font-size: 12px; color: var(--ink2); }

  .badge {
    font-size: 9px;
    font-weight: 800;
    padding: 2px 8px;
    border-radius: 20px;
    color: #fff;
    text-transform: uppercase;
    letter-spacing: .07em;
  }
  .chip {
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
  }

  .chevron { font-size: 11px; color: var(--muted); transition: transform .2s; }
  .chevron.open { transform: rotate(180deg); }

  /* CARD BODY */
  .card-body {
    padding: 0 18px 18px;
    border-top: 1px solid #f1f5f9;
    padding-top: 14px;
    display: none;
  }
  .card-body.open { display: block; }

  .section-label {
    font-size: 10px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .1em;
    margin-bottom: 7px;
  }

  .status-row { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; margin-bottom: 14px; }
  .status-btn {
    font-size: 11px;
    font-weight: 600;
    padding: 5px 11px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: .15s;
    font-family: 'DM Sans', sans-serif;
  }
  .status-btn:hover { opacity: .8; }

  textarea {
    width: 100%;
    padding: 9px 12px;
    border-radius: 9px;
    border: 1.5px solid var(--border);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--ink);
    resize: vertical;
    outline: none;
    background: #f8fafc;
    transition: border .15s;
  }
  textarea:focus { border-color: var(--ink); }

  .actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
  .btn-edit, .btn-del, .btn-wa, .btn-save-note {
    padding: 7px 14px;
    border: none;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: .15s;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .btn-edit { background: #f1f5f9; color: var(--ink2); }
  .btn-del { background: var(--danger-bg); color: var(--danger); }
  .btn-wa { background: #dcfce7; color: #15803d; }
  .btn-save-note { background: var(--ink); color: #fff; margin-top: 6px; }
  .btn-edit:hover, .btn-del:hover, .btn-wa:hover, .btn-save-note:hover { opacity: .8; transform: translateY(-1px); }

  /* MODAL */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(13,17,23,.55);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .overlay.open { display: flex; }
  .modal {
    background: var(--white);
    border-radius: 16px;
    padding: 28px;
    width: 100%;
    max-width: 480px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: var(--shadow-lg);
    animation: slideUp .2s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .modal h2 { font-size: 20px; font-weight: 800; margin-bottom: 20px; }

  .form-group { margin-bottom: 14px; }
  .form-label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .08em;
    margin-bottom: 5px;
  }
  .form-input {
    width: 100%;
    padding: 9px 13px;
    border-radius: 9px;
    border: 1.5px solid var(--border);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--ink);
    background: #f8fafc;
    outline: none;
    transition: border .15s;
  }
  .form-input:focus { border-color: var(--ink); }

  .modal-actions { display: flex; gap: 10px; margin-top: 6px; }
  .btn-confirm {
    padding: 10px 22px;
    background: var(--ink);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    transition: .15s;
  }
  .btn-confirm:hover { opacity: .85; }
  .btn-cancel {
    padding: 10px 18px;
    background: #f1f5f9;
    color: var(--muted);
    border: none;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    transition: .15s;
  }
  .btn-cancel:hover { background: #e2e8f0; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--ink);
    color: #fff;
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;
    box-shadow: var(--shadow-lg);
    opacity: 0;
    transform: translateY(10px);
    transition: .25s;
    z-index: 999;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  @media (max-width: 500px) {
    .header { padding: 16px; }
    .main { padding: 16px 12px; }
    .stat-value { font-size: 20px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="eyebrow">Task Cursos Itaboraí</div>
    <h1>Atendimentos</h1>
  </div>
  <button class="btn-new" onclick="openModal()">+ Novo atendimento</button>
</div>

<div class="main">
  <div class="stats" id="stats"></div>

  <div class="filters">
    <input type="text" id="busca" placeholder="🔍  Buscar aluno ou contato..." oninput="render()">
    <select id="filtroStatus" onchange="render()">
      <option value="todos">Todos os status</option>
      <option value="pendente">Pendente</option>
      <option value="em_andamento">Em andamento</option>
      <option value="aguardando_retorno">Aguardando retorno</option>
      <option value="resolvido">Resolvido</option>
    </select>
    <select id="filtroTipo" onchange="render()">
      <option value="todos">Todos os tipos</option>
      <option>Financeiro</option>
      <option>Acadêmico</option>
      <option>Matrícula / Contrato</option>
      <option>Dúvida sobre curso</option>
      <option>EAD / Polo Unicive</option>
      <option>Outro</option>
    </select>
  </div>

  <div id="list"></div>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="modal">
    <h2 id="modal-title">Novo atendimento</h2>
    <input type="hidden" id="edit-id">

    <div class="form-group">
      <label class="form-label">Nome do aluno *</label>
      <input class="form-input" id="f-nome" type="text" placeholder="Ex: Maria Silva">
    </div>
    <div class="form-group">
      <label class="form-label">Contato (WhatsApp)</label>
      <input class="form-input" id="f-contato" type="text" placeholder="Ex: 21999999999">
    </div>
    <div class="form-group">
      <label class="form-label">Tipo de problema</label>
      <select class="form-input" id="f-tipo">
        <option>Financeiro</option>
        <option>Acadêmico</option>
        <option>Matrícula / Contrato</option>
        <option>Dúvida sobre curso</option>
        <option>EAD / Polo Unicive</option>
        <option>Outro</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Status</label>
      <select class="form-input" id="f-status">
        <option value="pendente">Pendente</option>
        <option value="em_andamento">Em andamento</option>
        <option value="aguardando_retorno">Aguardando retorno</option>
        <option value="resolvido">Resolvido</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Prazo para resolver</label>
      <input class="form-input" id="f-prazo" type="date">
    </div>
    <div class="form-group">
      <label class="form-label">Anotações iniciais</label>
      <textarea class="form-input" id="f-notas" rows="3" placeholder="O que o aluno precisa, o que você vai verificar..."></textarea>
    </div>

    <div class="modal-actions">
      <button class="btn-confirm" onclick="saveAtendimento()">Salvar</button>
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const STATUS = {
  pendente:           { label: 'Pendente',           color: '#f59e0b', bg: '#fef9ee' },
  em_andamento:       { label: 'Em andamento',       color: '#3b82f6', bg: '#eff6ff' },
  aguardando_retorno: { label: 'Aguardando retorno', color: '#8b5cf6', bg: '#f5f3ff' },
  resolvido:          { label: 'Resolvido',          color: '#10b981', bg: '#ecfdf5' },
};

const API = 'https://script.google.com/macros/s/AKfycbwmBGpjQiUBsl_chgBsY5XUmJVsDeC1q-BuVV5RJqO1AB0WULtXu5LDKMCVb81Bnej-/exec';

let dados = [];
let expandido = null;
let carregando = false;

async function carregarDados() {
  carregando = true;
  document.getElementById('list').innerHTML = `<div class="empty">Carregando atendimentos...</div>`;
  try {
    const res = await fetch(`${API}?action=getAll`);
    const json = await res.json();
    dados = json.data || [];
    render();
  } catch(e) {
    document.getElementById('list').innerHTML = `<div class="empty">Erro ao carregar. Verifique sua conexão.</div>`;
  }
  carregando = false;
}

async function save(atendimento) {
  const res = await fetch(API, {
    method: 'POST',
    body: JSON.stringify({ action: 'save', atendimento }),
  });
  const json = await res.json();
  return json;
}

async function deletar(id) {
  const res = await fetch(`${API}?action=delete&id=${id}`);
  const json = await res.json();
  return json;
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

function cleanDate(d) {
  if (!d) return '';
  return String(d).split('T')[0].substring(0, 10);
}

function fmt(d) {
  const clean = cleanDate(d);
  if (!clean) return '—';
  const [y,m,day] = clean.split('-');
  return `${day}/${m}/${y}`;
}

function today() { return new Date().toISOString().split('T')[0]; }

function isOverdue(prazo, status) {
  const clean = cleanDate(prazo);
  return clean && status !== 'resolvido' && clean < today();
}

function isUrgent(prazo, status) {
  const clean = cleanDate(prazo);
  if (!clean || status === 'resolvido') return false;
  const diff = (new Date(clean) - new Date(today())) / 86400000;
  return diff >= 0 && diff <= 1;
}

function getFiltered() {
  const busca = document.getElementById('busca').value.toLowerCase();
  const filtroStatus = document.getElementById('filtroStatus').value;
  const filtroTipo = document.getElementById('filtroTipo').value;

  return dados
    .filter(a => {
      const mS = filtroStatus === 'todos' || a.status === filtroStatus;
      const mT = filtroTipo === 'todos' || a.tipo === filtroTipo;
      const mB = !busca || a.nome.toLowerCase().includes(busca) || (a.contato||'').includes(busca);
      return mS && mT && mB;
    })
    .sort((a, b) => {
      if (a.status === 'resolvido' && b.status !== 'resolvido') return 1;
      if (a.status !== 'resolvido' && b.status === 'resolvido') return -1;
      if (a.prazo && b.prazo) return a.prazo.localeCompare(b.prazo);
      if (a.prazo && !b.prazo) return -1;
      if (!a.prazo && b.prazo) return 1;
      return b.id - a.id;
    });
}

function renderStats() {
  const counts = { todos: dados.length };
  Object.keys(STATUS).forEach(s => counts[s] = dados.filter(a => a.status === s).length);
  const filtroAtual = document.getElementById('filtroStatus').value;

  const items = [
    { key: 'todos', label: 'Total', color: '#64748b' },
    { key: 'pendente', label: 'Pendentes', color: '#f59e0b' },
    { key: 'em_andamento', label: 'Em andamento', color: '#3b82f6' },
    { key: 'aguardando_retorno', label: 'Aguardando', color: '#8b5cf6' },
    { key: 'resolvido', label: 'Resolvidos', color: '#10b981' },
  ];

  document.getElementById('stats').innerHTML = items.map(i => `
    <div class="stat ${filtroAtual === i.key || (i.key === 'todos' && filtroAtual === 'todos') ? 'active' : ''}"
         onclick="setFiltroStatus('${i.key}')">
      <div class="stat-value" style="color:${i.color}">${counts[i.key] ?? 0}</div>
      <div class="stat-label">${i.label}</div>
    </div>
  `).join('');
}

function setFiltroStatus(v) {
  document.getElementById('filtroStatus').value = v;
  render();
}

function render() {
  renderStats();
  const list = document.getElementById('list');
  const filtered = getFiltered();

  if (!filtered.length) {
    list.innerHTML = `<div class="empty">${
      dados.length === 0
        ? 'Nenhum atendimento ainda.<br>Clique em "+ Novo atendimento" para começar.'
        : 'Nenhum resultado para os filtros aplicados.'
    }</div>`;
    return;
  }

  list.innerHTML = `<div class="list">${filtered.map(a => cardHTML(a)).join('')}</div>`;
}

function cardHTML(a) {
  const st = STATUS[a.status];
  const over = isOverdue(a.prazo, a.status);
  const urg = isUrgent(a.prazo, a.status);
  const isOpen = expandido === a.id;
  const borderColor = over ? '#ef4444' : urg ? '#f59e0b' : st.color;

  const badges = [
    over ? `<span class="badge" style="background:#ef4444">⚠ Vencido</span>` : '',
    (!over && urg) ? `<span class="badge" style="background:#f59e0b">⏰ Hoje</span>` : '',
  ].join('');

  return `
  <div class="card" style="border-left-color:${borderColor}">
    <div class="card-top" onclick="toggle(${a.id})">
      <div style="flex:1">
        <div class="card-name">${badges}${esc(a.nome)}</div>
        <div class="card-meta">
          <span class="chip" style="background:${st.bg};color:${st.color}">${st.label}</span>
          <span class="meta-text">📂 ${a.tipo}</span>
          ${a.contato ? `<span class="meta-text">📱 ${esc(a.contato)}</span>` : ''}
          ${a.prazo ? `<span class="meta-text" style="color:${over?'#ef4444':'#64748b'}">📅 ${fmt(a.prazo)}</span>` : ''}
        </div>
      </div>
      <span class="chevron ${isOpen?'open':''}">▼</span>
    </div>
    ${isOpen ? `
    <div class="card-body open">
      <div class="section-label">Status</div>
      <div class="status-row">
        ${Object.entries(STATUS).map(([k,v]) => `
          <button class="status-btn"
            style="${a.status===k ? `background:${v.bg};color:${v.color};border-color:${v.color};font-weight:700` : ''}"
            onclick="changeStatus(${a.id},'${k}')">
            ${v.label}
          </button>
        `).join('')}
      </div>
      <div class="section-label">Anotações / Histórico</div>
      <textarea id="nota-${a.id}" rows="3" placeholder="O que foi combinado, o que está pendente verificar...">${esc(a.notas||'')}</textarea>
      <button class="btn-save-note" onclick="saveNota(${a.id})">💾 Salvar anotação</button>
      <div class="actions">
        <button class="btn-edit" onclick="openModal(${a.id})">✏️ Editar</button>
        <button class="btn-del" onclick="remover(${a.id})">🗑 Remover</button>
        ${a.contato ? `<a class="btn-wa" href="https://wa.me/55${a.contato.replace(/\D/g,'')}" target="_blank">💬 Abrir no WhatsApp</a>` : ''}
      </div>
    </div>` : ''}
  </div>`;
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toggle(id) {
  expandido = expandido === id ? null : id;
  render();
}

async function changeStatus(id, status) {
  dados = dados.map(a => a.id === id ? {...a, status} : a);
  render();
  const atendimento = dados.find(a => a.id === id);
  await save(atendimento);
  toast('Status atualizado ✓');
}

async function saveNota(id) {
  const val = document.getElementById(`nota-${id}`)?.value ?? '';
  dados = dados.map(a => a.id === id ? {...a, notas: val} : a);
  const atendimento = dados.find(a => a.id === id);
  await save(atendimento);
  toast('Anotação salva ✓');
}

async function remover(id) {
  if (!confirm('Remover este atendimento?')) return;
  toast('Removendo...');
  await deletar(id);
  dados = dados.filter(a => a.id !== id);
  if (expandido === id) expandido = null;
  render();
  toast('Atendimento removido ✓');
}

// MODAL
function openModal(id) {
  const el = (i) => document.getElementById(i);
  el('edit-id').value = id || '';
  el('modal-title').textContent = id ? 'Editar atendimento' : 'Novo atendimento';

  if (id) {
    const a = dados.find(x => x.id === id);
    el('f-nome').value = a.nome || '';
    el('f-contato').value = a.contato || '';
    el('f-tipo').value = a.tipo || 'Financeiro';
    el('f-status').value = a.status || 'pendente';
    el('f-prazo').value = a.prazo || '';
    el('f-notas').value = a.notas || '';
  } else {
    el('f-nome').value = '';
    el('f-contato').value = '';
    el('f-tipo').value = 'Financeiro';
    el('f-status').value = 'pendente';
    el('f-prazo').value = '';
    el('f-notas').value = '';
  }

  el('overlay').classList.add('open');
  setTimeout(() => el('f-nome').focus(), 50);
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
}

function overlayClick(e) {
  if (e.target === document.getElementById('overlay')) closeModal();
}

async function saveAtendimento() {
  const nome = document.getElementById('f-nome').value.trim();
  if (!nome) { alert('Informe o nome do aluno.'); return; }

  const id = document.getElementById('edit-id').value;
  const obj = {
    nome,
    contato: document.getElementById('f-contato').value.trim(),
    tipo: document.getElementById('f-tipo').value,
    status: document.getElementById('f-status').value,
    prazo: document.getElementById('f-prazo').value,
    notas: document.getElementById('f-notas').value.trim(),
    criadoEm: today(),
  };

  if (id) {
    obj.id = Number(id);
    dados = dados.map(a => a.id === Number(id) ? {...a, ...obj} : a);
    closeModal();
    render();
    toast('Salvando...');
    await save(obj);
    toast('Atendimento atualizado ✓');
  } else {
    closeModal();
    toast('Salvando...');
    const result = await save(obj);
    obj.id = result.id;
    dados.push(obj);
    render();
    toast('Atendimento criado ✓');
  }
}

// keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

carregarDados();
</script>
</body>
